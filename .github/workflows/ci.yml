name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: ProbaLab

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ruff

      - name: Lint (ruff check)
        run: ruff check src/ api/ tests/

      - name: Format check (ruff format)
        run: ruff format --check src/ api/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      API_FOOTBALL_KEY: "test"
      GEMINI_API_KEY: "test"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ProbaLab/requirements.txt

      - run: pip install -r requirements.txt

      - run: pip install pytest pytest-timeout pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/ -m "not integration" --timeout=60 --cov=src --cov=api --cov-report=term-missing --cov-fail-under=21 -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ProbaLab/test-results.xml
          if-no-files-found: ignore

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: pip install mypy

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

  frontend-tests:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ProbaLab/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ProbaLab/dashboard/package-lock.json
      - run: npm ci
      - name: Run Vitest
        env:
          VITE_API_URL: 'http://localhost:8000'
        run: npm run test:ci

  e2e:
    name: E2E Playwright
    runs-on: ubuntu-latest
    needs: [frontend-tests]
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ProbaLab/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ProbaLab/dashboard/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        env:
          VITE_FRONTEND_V2: 'true'
          VITE_MSW_ENABLED: 'true'
          VITE_MSW_PREVIEW: 'true'
          VITE_E2E: 'true'
          VITE_API_URL: 'http://localhost:8000'
          VITE_SUPABASE_URL: 'https://placeholder.supabase.co'
          VITE_SUPABASE_ANON_KEY: 'placeholder-key'
        run: npm run build
      - name: Run Playwright tests
        env:
          VITE_FRONTEND_V2: 'true'
          VITE_MSW_ENABLED: 'true'
          CI: 'true'
        run: npm run e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ProbaLab/dashboard/playwright-report/
          retention-days: 7
