name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: ProbaLab

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ruff

      - name: Lint (ruff check)
        run: ruff check src/ api/ tests/

      - name: Format check (ruff format)
        run: ruff format --check src/ api/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      API_FOOTBALL_KEY: "test"
      GEMINI_API_KEY: "test"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ProbaLab/requirements.txt

      - run: pip install -r requirements.txt

      - run: pip install pytest pytest-timeout pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/ -m "not integration" --timeout=60 --cov=src --cov=api --cov-report=term-missing --cov-fail-under=21 -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ProbaLab/test-results.xml
          if-no-files-found: ignore

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: pip install mypy

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports --no-error-summary || true
