[build]
builder = "nixpacks"

[[services]]
name = "web"
[services.deploy]
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "worker"
[services.deploy]
startCommand = "python worker.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
